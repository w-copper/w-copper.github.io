浊辨。覆载群生仰至仁，发明万物皆成善。

盖闻天地之数，有十二万九千六百岁为一元。将一元分为十二会，乃子、丑、寅、卯、辰、巳、午、未、申、酉、戌、亥之十二支也。每会该一万八百岁。

感盘古开辟，三皇治世，五帝定伦，世界之间，遂分为四大部洲：曰东胜神洲，曰西牛贺洲，曰南赡部洲，曰北俱芦洲。这部书单表东胜神洲。海外有一国土，名曰傲来国。国近大海，海中有一座山，唤为花果山。此山乃十洲之祖脉，三岛之来龙。`},{title:"第二回 悟彻菩提真妙理 断魔归本合元神",content:`话表美猴王得了姓名，怡然踊跃，对菩提前作礼启谢。那祖师即命大众引悟空出二门外，教他洒扫应对、进退周旋之节。众仙奉行而出。

次早，与众师兄学言语礼貌，讲经论道，习字焚香，每日如此。闲时即扫地锄园，养花修树，寻柴燃火，挑水运浆。在洞中不觉倏六七年。

一日，祖师登坛高坐，唤集诸仙，开讲大道。孙悟空在旁闻听，喜得他抓耳挠腮，眉花眼笑。忍不住手之舞之，足之蹈之。`}]},{id:"sample_2",name:"三体",author:"刘慈欣",category:"科幻",description:"地球文明向宇宙发出的第一声啼鸣，引来了三体文明的注意。",cover:"🌌",chapters:[{title:"第一章 科学边界",content:`汪淼觉得，过去的四十多年中，自己从未像现在这样对世界充满好奇心。作为一名纳米材料研究者，他的世界一直是由分子、原子和纳米管构成的微观天地。

那年夏天，我遇到了一个老人。他叫福贵，是一个地主的儿子。他年轻的时候是一个纨绔子弟，吃喝嫖赌，把家产败光了。

我是在一个下午遇到福贵的。他正在田里耕地，那头老牛走得很慢，他也走得很慢。`},{title:"第二章",content:`我和福贵坐在田埂上，他开始给我讲他的故事。我年轻的时候，是这方圆几十里最阔的少爷。福贵说，眼睛看着远处的山，我爹有两百多亩地，家里有几十个长工。
