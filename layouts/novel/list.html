{{- define "title" }}{{ .Title }} - {{ .Site.Title }}{{- end -}}

{{- define "content" -}}
<div class="novel-page">
    <h1 class="novel-title">📚 小说阅读器</h1>
    <p class="novel-description">在线小说阅读器，支持书架管理、章节阅读、阅读进度保存</p>

    <div id="bookshelf-view">
        <div class="bookshelf-toolbar">
            <div class="toolbar-left">
                <button class="btn btn-primary" onclick="showAddNovelModal()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
                    </svg>
                    添加小说
                </button>
                <button class="btn btn-outline" onclick="showImportModal()">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zm-3-7H9v2h6v2l3-3-3-3v2z"/>
                    </svg>
                    导入TXT
                </button>
            </div>
            <div class="toolbar-right">
                <div class="category-filter">
                    <select id="category-filter" onchange="filterByCategory(this.value)">
                        <option value="all">全部分类</option>
                        <option value="玄幻">玄幻</option>
                        <option value="都市">都市</option>
                        <option value="历史">历史</option>
                        <option value="科幻">科幻</option>
                        <option value="武侠">武侠</option>
                        <option value="言情">言情</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="搜索小说..." oninput="searchNovels(this.value)">
                    <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
                        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
                    </svg>
                </div>
            </div>
        </div>

        <div id="bookshelf-grid" class="bookshelf-grid"></div>

        <div id="empty-bookshelf" class="empty-bookshelf" style="display:none;">
            <div class="empty-icon">📚</div>
            <h3>书架空空如也</h3>
            <p>点击"添加小说"或"导入TXT"开始你的阅读之旅</p>
        </div>
    </div>

    <div id="reading-view" style="display:none;">
        <div class="reading-header">
            <button class="btn btn-back" onclick="backToBookshelf()">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                返回书架
            </button>
            <div class="reading-info">
                <h2 id="reading-title"></h2>
                <span id="reading-chapter-name"></span>
            </div>
            <div class="reading-controls">
                <button class="btn btn-icon" onclick="toggleChapterList()" title="章节目录">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
                    </svg>
                </button>
                <button class="btn btn-icon" onclick="adjustFontSize(1)" title="放大字体">A+</button>
                <button class="btn btn-icon" onclick="adjustFontSize(-1)" title="缩小字体">A-</button>
            </div>
        </div>

        <div class="reading-body">
            <div id="chapter-sidebar" class="chapter-sidebar">
                <div class="chapter-sidebar-header">
                    <h3>章节目录</h3>
                    <button class="btn btn-icon" onclick="toggleChapterList()">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                        </svg>
                    </button>
                </div>
                <div id="chapter-list" class="chapter-list"></div>
            </div>

            <div id="reading-content" class="reading-content">
                <div id="chapter-content" class="chapter-content"></div>
                <div class="chapter-navigation">
                    <button id="prev-chapter-btn" class="btn btn-nav" onclick="navigateChapter(-1)">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/>
                        </svg>
                        上一章
                    </button>
                    <span id="chapter-progress" class="chapter-progress"></span>
                    <button id="next-chapter-btn" class="btn btn-nav" onclick="navigateChapter(1)">
                        下一章
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                            <path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div id="add-novel-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加小说</h3>
                <button class="btn btn-icon" onclick="closeModal('add-novel-modal')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>小说名称 *</label>
                    <input type="text" id="novel-name" placeholder="请输入小说名称">
                </div>
                <div class="form-group">
                    <label>作者</label>
                    <input type="text" id="novel-author" placeholder="请输入作者名称">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="novel-category">
                        <option value="玄幻">玄幻</option>
                        <option value="都市">都市</option>
                        <option value="历史">历史</option>
                        <option value="科幻">科幻</option>
                        <option value="武侠">武侠</option>
                        <option value="言情">言情</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>简介</label>
                    <textarea id="novel-description" placeholder="请输入小说简介" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('add-novel-modal')">取消</button>
                <button class="btn btn-primary" onclick="addNovel()">添加</button>
            </div>
        </div>
    </div>

    <div id="import-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3>导入TXT文件</h3>
                <button class="btn btn-icon" onclick="closeModal('import-modal')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>小说名称 *</label>
                    <input type="text" id="import-name" placeholder="请输入小说名称">
                </div>
                <div class="form-group">
                    <label>作者</label>
                    <input type="text" id="import-author" placeholder="请输入作者名称">
                </div>
                <div class="form-group">
                    <label>分类</label>
                    <select id="import-category">
                        <option value="玄幻">玄幻</option>
                        <option value="都市">都市</option>
                        <option value="历史">历史</option>
                        <option value="科幻">科幻</option>
                        <option value="武侠">武侠</option>
                        <option value="言情">言情</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>TXT文件</label>
                    <div class="file-upload" id="file-upload-area">
                        <input type="file" id="txt-file" accept=".txt" onchange="handleFileUpload(this)">
                        <div class="file-upload-content">
                            <svg viewBox="0 0 24 24" width="48" height="48" fill="currentColor">
                                <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm4 18H6V4h7v5h5v11zm-3-7H9v2h6v2l3-3-3-3v2z"/>
                            </svg>
                            <p>点击或拖拽TXT文件到此处</p>
                            <span>支持.txt格式</span>
                        </div>
                    </div>
                    <div id="file-info" class="file-info" style="display:none;">
                        <span id="file-name"></span>
                        <button class="btn btn-icon" onclick="clearFile()">
                            <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor">
                                <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>章节识别模式</label>
                    <select id="chapter-pattern">
                        <option value="auto">自动识别</option>
                        <option value="regex">正则表达式</option>
                        <option value="fixed">固定字数分割</option>
                    </select>
                </div>
                <div class="form-group" id="regex-pattern-group" style="display:none;">
                    <label>章节正则表达式</label>
                    <input type="text" id="chapter-regex" placeholder="例如：^第.+章" value="^第.+章">
                </div>
                <div class="form-group" id="fixed-length-group" style="display:none;">
                    <label>每章字数</label>
                    <input type="number" id="chapter-length" placeholder="例如：3000" value="3000">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('import-modal')">取消</button>
                <button class="btn btn-primary" onclick="importNovel()">导入</button>
            </div>
        </div>
    </div>

    <div id="confirm-modal" class="modal" style="display:none;">
        <div class="modal-content modal-small">
            <div class="modal-header">
                <h3>确认删除</h3>
                <button class="btn btn-icon" onclick="closeModal('confirm-modal')">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>
                    </svg>
                </button>
            </div>
            <div class="modal-body">
                <p id="confirm-message">确定要删除这本小说吗？此操作不可恢复。</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeModal('confirm-modal')">取消</button>
                <button class="btn btn-danger" id="confirm-btn" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>
</div>

<style>
.novel-page {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
    min-height: 80vh;
}

.novel-title {
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    color: #2c3e50;
}

.novel-description {
    text-align: center;
    color: #666;
    margin-bottom: 2rem;
    font-size: 1.1rem;
}

.btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.2rem;
    border: none;
    border-radius: 10px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s ease;
    text-decoration: none;
}

.btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(102, 126, 234, 0.25);
}

.btn-outline {
    background: transparent;
    color: #667eea;
    border: 1.5px solid #667eea;
}

.btn-outline:hover {
    background: #667eea;
    color: white;
}

.btn-danger {
    background: #e74c3c;
    color: white;
}

.btn-danger:hover {
    background: #c0392b;
}

.btn-back {
    background: white;
    color: #2c3e50;
    border: 1px solid #e0e0e0;
}

.btn-back:hover {
    background: #f8f9fa;
}

.btn-icon {
    background: transparent;
    color: #666;
    padding: 0.5rem;
    border-radius: 50%;
}

.btn-icon:hover {
    background: #f8f9fa;
    color: #667eea;
}

.btn-nav {
    background: white;
    color: #2c3e50;
    border: 1px solid #e0e0e0;
    padding: 0.8rem 1.5rem;
}

.btn-nav:hover:not(:disabled) {
    background: #667eea;
    color: white;
    border-color: #667eea;
}

.btn-nav:disabled {
    opacity: 0.5;
    cursor: not-allowed;
}

.bookshelf-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    gap: 1rem;
}

.toolbar-left {
    display: flex;
    gap: 0.8rem;
}

.toolbar-right {
    display: flex;
    gap: 1rem;
    align-items: center;
}

.category-filter select {
    padding: 0.6rem 1rem;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    background: white;
    color: #2c3e50;
    font-size: 0.9rem;
    cursor: pointer;
}

.search-box {
    position: relative;
}

.search-box input {
    padding: 0.6rem 1rem 0.6rem 2.5rem;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    background: white;
    color: #2c3e50;
    font-size: 0.9rem;
    width: 200px;
    transition: all 0.3s ease;
}

.search-box input:focus {
    outline: none;
    border-color: #667eea;
    width: 260px;
}

.search-box svg {
    position: absolute;
    left: 0.8rem;
    top: 50%;
    transform: translateY(-50%);
    color: #666;
}

.bookshelf-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
}

.book-card {
    background: white;
    border-radius: 16px;
    padding: 1.5rem;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    transition: all 0.3s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
}

.book-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 30px rgba(102, 126, 234, 0.25);
}

.book-card-header {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
}

.book-cover {
    width: 80px;
    height: 110px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    flex-shrink: 0;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
}

.book-info {
    flex: 1;
    min-width: 0;
}

.book-title {
    font-size: 1.1rem;
    font-weight: 600;
    color: #2c3e50;
    margin-bottom: 0.3rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.book-author {
    font-size: 0.85rem;
    color: #666;
    margin-bottom: 0.5rem;
}

.book-category {
    display: inline-block;
    padding: 0.2rem 0.6rem;
    background: rgba(102, 126, 234, 0.1);
    color: #667eea;
    border-radius: 20px;
    font-size: 0.75rem;
}

.book-description {
    font-size: 0.85rem;
    color: #666;
    line-height: 1.5;
    margin-bottom: 1rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.book-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.book-progress {
    flex: 1;
}

.progress-bar {
    height: 6px;
    background: #e0e0e0;
    border-radius: 3px;
    overflow: hidden;
    margin-bottom: 0.3rem;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 3px;
    transition: width 0.3s ease;
}

.progress-text {
    font-size: 0.75rem;
    color: #666;
}

.book-actions {
    display: flex;
    gap: 0.3rem;
    opacity: 0;
    transition: opacity 0.2s ease;
}

.book-card:hover .book-actions {
    opacity: 1;
}

.empty-bookshelf {
    text-align: center;
    padding: 4rem 2rem;
    color: #666;
}

.empty-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
}

.empty-bookshelf h3 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: #2c3e50;
}

.reading-header {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

.reading-info {
    flex: 1;
    min-width: 0;
}

.reading-info h2 {
    font-size: 1.3rem;
    margin: 0 0 0.2rem;
    color: #2c3e50;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.reading-info span {
    font-size: 0.85rem;
    color: #666;
}

.reading-controls {
    display: flex;
    gap: 0.3rem;
}

.reading-body {
    display: flex;
    gap: 1.5rem;
    min-height: 70vh;
}

.chapter-sidebar {
    width: 280px;
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: all 0.3s ease;
}

.chapter-sidebar.collapsed {
    width: 0;
    overflow: hidden;
    padding: 0;
    margin: 0;
}

.chapter-sidebar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 1.2rem;
    border-bottom: 1px solid #e0e0e0;
}

.chapter-sidebar-header h3 {
    font-size: 1rem;
    margin: 0;
    color: #2c3e50;
}

.chapter-list {
    flex: 1;
    overflow-y: auto;
    padding: 0.5rem;
}

.chapter-item {
    padding: 0.8rem 1rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 0.9rem;
    color: #2c3e50;
}

.chapter-item:hover {
    background: #f8f9fa;
}

.chapter-item.active {
    background: #667eea;
    color: white;
}

.reading-content {
    flex: 1;
    background: white;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    min-width: 0;
}

.chapter-content {
    flex: 1;
    padding: 2rem 3rem;
    font-size: 16px;
    line-height: 1.8;
    color: #2c3e50;
    overflow-y: auto;
}

.chapter-content p {
    text-indent: 2em;
    margin-bottom: 1em;
}

.chapter-navigation {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 2rem;
    border-top: 1px solid #e0e0e0;
}

.chapter-progress {
    font-size: 0.85rem;
    color: #666;
}

.modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    backdrop-filter: blur(4px);
}

.modal-content {
    background: white;
    border-radius: 16px;
    width: 90%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
}

.modal-small {
    max-width: 400px;
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem;
    border-bottom: 1px solid #e0e0e0;
}

.modal-header h3 {
    margin: 0;
    font-size: 1.2rem;
    color: #2c3e50;
}

.modal-body {
    padding: 1.5rem;
}

.modal-footer {
    display: flex;
    justify-content: flex-end;
    gap: 0.8rem;
    padding: 1rem 1.5rem;
    border-top: 1px solid #e0e0e0;
}

.form-group {
    margin-bottom: 1.2rem;
}

.form-group label {
    display: block;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
    font-weight: 500;
    color: #2c3e50;
}

.form-group input,
.form-group select,
.form-group textarea {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 1px solid #e0e0e0;
    border-radius: 10px;
    background: white;
    color: #2c3e50;
    font-size: 0.9rem;
    transition: border-color 0.2s ease;
    box-sizing: border-box;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
    outline: none;
    border-color: #667eea;
}

.form-group textarea {
    resize: vertical;
    min-height: 80px;
}

<script>

    PROGRESS: 'novel_reader_progress'

const SAMPLE_NOVELS = [

    {
        id: 'sample_2',
        name: '三体',
        author: '刘慈欣',

                title: '第一章 科学边界',

    {

            {
                title: '第二章',
                content: '我和福贵坐在田埂上，他开始给我讲他的故事。我年轻的时候，是这方圆几十里最阔的少爷。福贵说，眼睛看着远处的山，我爹有两百多亩地，家里有几十个长工。\n\n我那时候最喜欢的事情就是赌博。我经常去城里赌博，一赌就是几天几夜。我输了好多钱，但我爹总是帮我把债还上。'

let novels = [];
let progress = {};
let currentNovel = null;
let currentChapterIndex = 0;
let deleteTargetId = null;
let uploadedFileContent = null;
let fontSize = parseInt(localStorage.getItem('novel_font_size') || '16');

document.addEventListener('DOMContentLoaded', function() {
    loadData();
    renderBookshelf();
    updateFontSize();
});

function loadData() {
    const savedNovels = localStorage.getItem(STORAGE_KEYS.NOVELS);
    if (savedNovels) {
        novels = JSON.parse(savedNovels);
    } else {
        novels = JSON.parse(JSON.stringify(SAMPLE_NOVELS));
        saveNovels();
    }

    const savedProgress = localStorage.getItem(STORAGE_KEYS.PROGRESS);
    if (savedProgress) {
        progress = JSON.parse(savedProgress);
    }
}

function saveNovels() {
    localStorage.setItem(STORAGE_KEYS.NOVELS, JSON.stringify(novels));
}

function saveProgress() {
    localStorage.setItem(STORAGE_KEYS.PROGRESS, JSON.stringify(progress));
}

function getNovelProgress(novelId) {
    if (!progress[novelId]) {
        return { chapter: 0, scroll: 0, percentage: 0 };
    }
    return progress[novelId];
}

function updateNovelProgress(novelId, chapterIndex, scrollPercentage) {
    const novel = novels.find(function(n) { return n.id === novelId; });
    if (!novel) return;

    const totalChapters = novel.chapters.length;
    const overallPercentage = Math.round(((chapterIndex + 1) / totalChapters) * 100);

    progress[novelId] = {
        chapter: chapterIndex,
        scroll: scrollPercentage || 0,
        percentage: overallPercentage,
        lastRead: new Date().toISOString()
    };

    saveProgress();
}

function renderBookshelf(filter, search) {
    filter = filter || 'all';
    search = search || '';

    const grid = document.getElementById('bookshelf-grid');
    const empty = document.getElementById('empty-bookshelf');

    let filteredNovels = novels;

    if (filter !== 'all') {
        filteredNovels = filteredNovels.filter(function(n) { return n.category === filter; });
    }

    if (search) {
        var searchLower = search.toLowerCase();
        filteredNovels = filteredNovels.filter(function(n) {
            return n.name.toLowerCase().indexOf(searchLower) !== -1 ||
                   n.author.toLowerCase().indexOf(searchLower) !== -1;
        });
    }

    if (filteredNovels.length === 0) {
        grid.style.display = 'none';
        empty.style.display = 'block';
        return;
    }

    grid.style.display = 'grid';
    empty.style.display = 'none';

    var html = '';
    for (var i = 0; i < filteredNovels.length; i++) {
        var novel = filteredNovels[i];
        var prog = getNovelProgress(novel.id);
        html += '<div class="book-card" onclick="openNovel(\'' + novel.id + '\')">';
        html += '<div class="book-card-header">';
        html += '<div class="book-cover">' + (novel.cover || '📕') + '</div>';
        html += '<div class="book-info">';
        html += '<div class="book-title" title="' + novel.name + '">' + novel.name + '</div>';
        html += '<div class="book-author">' + (novel.author || '未知作者') + '</div>';
        html += '<span class="book-category">' + novel.category + '</span>';
        html += '</div></div>';
        html += '<div class="book-description">' + (novel.description || '暂无简介') + '</div>';
        html += '<div class="book-footer"><div class="book-progress">';
        html += '<div class="progress-bar"><div class="progress-fill" style="width: ' + prog.percentage + '%"></div></div>';
        html += '<div class="progress-text">';
        html += prog.percentage > 0 ? '已读 ' + prog.percentage + '%' : '未开始阅读';
        if (prog.lastRead) html += ' · ' + formatDate(prog.lastRead);
        html += '</div></div>';
        html += '<div class="book-actions">';
        html += '<button class="btn btn-icon" onclick="event.stopPropagation(); confirmDeleteNovel(\'' + novel.id + '\')" title="删除">';
        html += '<svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>';
        html += '</button></div></div></div>';
    }
    grid.innerHTML = html;
}

function showAddNovelModal() {
    document.getElementById('novel-name').value = '';
    document.getElementById('novel-author').value = '';
    document.getElementById('novel-category').value = '玄幻';
    document.getElementById('novel-description').value = '';
    openModal('add-novel-modal');
}

function addNovel() {
    var name = document.getElementById('novel-name').value.trim();
    var author = document.getElementById('novel-author').value.trim();
    var category = document.getElementById('novel-category').value;
    var description = document.getElementById('novel-description').value.trim();

    if (!name) {
        alert('请输入小说名称');
        return;
    }

    var covers = ['📕', '📗', '📘', '📙', '📓', '📔', '📒', '📚'];
    var randomCover = covers[Math.floor(Math.random() * covers.length)];

    var novel = {
        id: 'novel_' + Date.now(),
        name: name,
        author: author || '未知作者',
        category: category,
        description: description || '暂无简介',
        cover: randomCover,
        chapters: [{ title: '第一章', content: '请编辑章节内容...' }]
    };

    novels.push(novel);
    saveNovels();
    renderBookshelf();
    closeModal('add-novel-modal');
}

function confirmDeleteNovel(novelId) {
    deleteTargetId = novelId;
    var novel = novels.find(function(n) { return n.id === novelId; });
    if (novel) {
        document.getElementById('confirm-message').textContent =
            '确定要删除《' + novel.name + '》吗？此操作不可恢复。';
    }
    openModal('confirm-modal');
}

function confirmDelete() {
    if (!deleteTargetId) return;

    novels = novels.filter(function(n) { return n.id !== deleteTargetId; });
    delete progress[deleteTargetId];
    saveNovels();
    saveProgress();
    renderBookshelf();
    closeModal('confirm-modal');
    deleteTargetId = null;
}

function showImportModal() {
    document.getElementById('import-name').value = '';
    document.getElementById('import-author').value = '';
    document.getElementById('import-category').value = '其他';
    document.getElementById('txt-file').value = '';
    document.getElementById('file-info').style.display = 'none';
    document.getElementById('file-upload-area').style.display = 'block';
    uploadedFileContent = null;
    openModal('import-modal');
}

function handleFileUpload(input) {
    var file = input.files[0];
    if (!file) return;

    if (!file.name.endsWith('.txt')) {
        alert('请选择.txt格式的文件');
        return;
    }

    var reader = new FileReader();
    reader.onload = function(e) {
        uploadedFileContent = e.target.result;
        document.getElementById('file-name').textContent = file.name;
        document.getElementById('file-info').style.display = 'flex';
        document.getElementById('file-upload-area').style.display = 'none';

        if (!document.getElementById('import-name').value) {
            document.getElementById('import-name').value = file.name.replace('.txt', '');
        }
    };
    reader.readAsText(file);
}

function clearFile() {
    uploadedFileContent = null;
    document.getElementById('txt-file').value = '';
    document.getElementById('file-info').style.display = 'none';
    document.getElementById('file-upload-area').style.display = 'block';
}

function importNovel() {
    var name = document.getElementById('import-name').value.trim();
    var author = document.getElementById('import-author').value.trim();
    var category = document.getElementById('import-category').value;
    var patternType = document.getElementById('chapter-pattern').value;

    if (!name) {
        alert('请输入小说名称');
        return;
    }

    if (!uploadedFileContent) {
        alert('请选择要导入的TXT文件');
        return;
    }

    var chapters = [];
    if (patternType === 'auto') {
        chapters = autoDetectChapters(uploadedFileContent);
    } else if (patternType === 'regex') {
        var regex = document.getElementById('chapter-regex').value;
        chapters = splitByRegex(uploadedFileContent, regex);
    } else {
        var length = parseInt(document.getElementById('chapter-length').value) || 3000;
        chapters = splitByLength(uploadedFileContent, length);
    }

    if (chapters.length === 0) {
        alert('未能识别出任何章节，请检查文件格式或调整分割方式');
        return;
    }

    var covers = ['📕', '📗', '📘', '📙', '📓', '📔', '📒', '📚'];
    var randomCover = covers[Math.floor(Math.random() * covers.length)];

    var novel = {
        id: 'novel_' + Date.now(),
        name: name,
        author: author || '未知作者',
        category: category,
        description: '共' + chapters.length + '章',
        cover: randomCover,
        chapters: chapters
    };

    novels.push(novel);
    saveNovels();
    renderBookshelf();
    closeModal('import-modal');
    alert('成功导入《' + name + '》，共' + chapters.length + '章');
}

function autoDetectChapters(text) {
    var patterns = [
        /^第[一二三四五六七八九十百千万零〇\d]+[章节回卷集部篇]/m,
        /^Chapter\s+\d+/mi,
        /^\d+\.\s+/m
    ];

    for (var i = 0; i < patterns.length; i++) {
        if (patterns[i].test(text)) {
            return splitByRegex(text, patterns[i].source);
        }
    }

    return splitByLength(text, 3000);
}

function splitByRegex(text, regexStr) {
    var regex = new RegExp(regexStr, 'gm');
    var matches = [];
    var match;
    while ((match = regex.exec(text)) !== null) {
        matches.push({ index: match.index, text: match[0] });
    }

    if (matches.length === 0) {
        return splitByLength(text, 3000);
    }

    var chapters = [];
    for (var i = 0; i < matches.length; i++) {
        var start = matches[i].index;
        var end = i + 1 < matches.length ? matches[i + 1].index : text.length;
        var content = text.substring(start, end).trim();

        var lines = content.split('\n');
        var title = lines[0].trim();
        var body = lines.slice(1).join('\n').trim();

        chapters.push({
            title: title,
            content: body || content
        });
    }

    return chapters;
}

function splitByLength(text, length) {
    var chapters = [];
    var remaining = text;
    var index = 1;

    while (remaining.length > 0) {
        var end = Math.min(length, remaining.length);

        if (end < remaining.length) {
            var breakPoints = ['。', '！', '？', '\n\n'];
            for (var i = 0; i < breakPoints.length; i++) {
                var lastBreak = remaining.lastIndexOf(breakPoints[i], end);
                if (lastBreak > end * 0.5) {
                    end = lastBreak + 1;
                    break;
                }
            }
        }

        chapters.push({
            title: '第' + index + '章',
            content: remaining.substring(0, end).trim()
        });

        remaining = remaining.substring(end).trim();
        index++;
    }

    return chapters;
}

document.getElementById('chapter-pattern').addEventListener('change', function() {
    document.getElementById('regex-pattern-group').style.display =
        this.value === 'regex' ? 'block' : 'none';
    document.getElementById('fixed-length-group').style.display =
        this.value === 'fixed' ? 'block' : 'none';
});

function openNovel(novelId) {
    var novel = novels.find(function(n) { return n.id === novelId; });
    if (!novel) return;

    currentNovel = novel;
    var prog = getNovelProgress(novelId);
    currentChapterIndex = prog.chapter || 0;

    document.getElementById('bookshelf-view').style.display = 'none';
    document.getElementById('reading-view').style.display = 'block';

    document.getElementById('reading-title').textContent = novel.name;

    renderChapterList();
    loadChapter(currentChapterIndex);

    setTimeout(function() {
        var content = document.getElementById('chapter-content');
        if (prog.scroll) {
            content.scrollTop = content.scrollHeight * prog.scroll;
        }
    }, 100);
}

function backToBookshelf() {
    if (currentNovel) {
        var content = document.getElementById('chapter-content');
        var scrollPercentage = content.scrollTop / content.scrollHeight;
        updateNovelProgress(currentNovel.id, currentChapterIndex, scrollPercentage);
    }

    document.getElementById('bookshelf-view').style.display = 'block';
    document.getElementById('reading-view').style.display = 'none';

    currentNovel = null;
    renderBookshelf();
}

function renderChapterList() {
    if (!currentNovel) return;

    var list = document.getElementById('chapter-list');
    var html = '';
    for (var i = 0; i < currentNovel.chapters.length; i++) {
        var chapter = currentNovel.chapters[i];
        var activeClass = i === currentChapterIndex ? ' active' : '';
        html += '<div class="chapter-item' + activeClass + '" onclick="loadChapter(' + i + ')">';
        html += chapter.title;
        html += '</div>';
    }
    list.innerHTML = html;
}

function loadChapter(index) {
    if (!currentNovel || index < 0 || index >= currentNovel.chapters.length) return;

    currentChapterIndex = index;
    var chapter = currentNovel.chapters[index];

    var contentEl = document.getElementById('chapter-content');
    var paragraphs = chapter.content.split('\n').filter(function(p) { return p.trim(); });
    var html = '';
    for (var i = 0; i < paragraphs.length; i++) {
        html += '<p>' + paragraphs[i] + '</p>';
    }
    contentEl.innerHTML = html;
    contentEl.scrollTop = 0;

    document.getElementById('reading-chapter-name').textContent = chapter.title;
    document.getElementById('chapter-progress').textContent =
        '第 ' + (index + 1) + ' / ' + currentNovel.chapters.length + ' 章';

    document.getElementById('prev-chapter-btn').disabled = index === 0;
    document.getElementById('next-chapter-btn').disabled = index === currentNovel.chapters.length - 1;

    var items = document.querySelectorAll('.chapter-item');
    for (var i = 0; i < items.length; i++) {
        if (i === index) {
            items[i].classList.add('active');
        } else {
            items[i].classList.remove('active');
        }
    }

    updateNovelProgress(currentNovel.id, index, 0);
}

function navigateChapter(direction) {
    var newIndex = currentChapterIndex + direction;
    if (newIndex >= 0 && newIndex < currentNovel.chapters.length) {
        loadChapter(newIndex);
    }
}

function toggleChapterList() {
    var sidebar = document.getElementById('chapter-sidebar');
    sidebar.classList.toggle('collapsed');
    sidebar.classList.toggle('visible');
}

function adjustFontSize(delta) {
    fontSize = Math.max(12, Math.min(24, fontSize + delta));
    localStorage.setItem('novel_font_size', fontSize.toString());
    updateFontSize();
}

function updateFontSize() {
    var contentEl = document.getElementById('chapter-content');
    if (contentEl) {
        contentEl.style.fontSize = fontSize + 'px';
    }
}

function filterByCategory(category) {
    var search = document.getElementById('search-input').value;
    renderBookshelf(category, search);
}

function searchNovels(search) {
    var category = document.getElementById('category-filter').value;
    renderBookshelf(category, search);
}

function openModal(modalId) {
    document.getElementById(modalId).style.display = 'flex';
}

function closeModal(modalId) {
    document.getElementById(modalId).style.display = 'none';
}

function formatDate(dateStr) {
    if (!dateStr) return '';
    var date = new Date(dateStr);
    var now = new Date();
    var diff = now - date;

    if (diff < 60000) return '刚刚';
    if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
    if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
    if (diff < 604800000) return Math.floor(diff / 86400000) + '天前';

    return (date.getMonth() + 1) + '月' + date.getDate() + '日';
}

document.getElementById('chapter-content').addEventListener('scroll', function() {
    if (currentNovel) {
        var self = this;
        var scrollPercentage = self.scrollTop / self.scrollHeight;
        clearTimeout(self._saveTimeout);
        self._saveTimeout = setTimeout(function() {
            updateNovelProgress(currentNovel.id, currentChapterIndex, scrollPercentage);
        }, 500);
    }
});

document.addEventListener('keydown', function(e) {
    if (!currentNovel) return;

    if (e.key === 'ArrowLeft') {
        navigateChapter(-1);
    } else if (e.key === 'ArrowRight') {
        navigateChapter(1);
    } else if (e.key === 'Escape') {
        backToBookshelf();
    }
});
</script>
