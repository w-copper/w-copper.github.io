{{- define "title" }}{{ .Title }} - {{ .Site.Title }}{{- end -}}

{{- define "content" -}}
<div class="projects-page">
    <div class="projects-header">
        {{- dict "Content" .Content "Ruby" true "Fraction" true | partial "function/content.html" | safeHTML -}}
    </div>
</div>

<style>
.projects-page {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
}

.projects-header {
    margin-bottom: 2rem;
}

.projects-header h1 {
    text-align: center;
    font-size: 2.5rem;
    color: #2c3e50;
    margin-bottom: 1rem;
}

.projects-header p {
    text-align: center;
    color: #666;
    font-size: 1.1rem;
    max-width: 800px;
    margin: 0 auto;
}

.project-stats {
    text-align: center;
    margin: 1.5rem 0;
}

.stat-item {
    display: inline-block;
    padding: 0.5rem 1.5rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-radius: 20px;
    font-weight: 500;
}

.view-toggle {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin: 1.5rem 0;
}

.toggle-btn {
    padding: 0.8rem 1.5rem;
    border: 2px solid #667eea;
    background: transparent;
    color: #667eea;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
}

.toggle-btn:hover {
    background: rgba(102, 126, 234, 0.1);
}

.toggle-btn.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-color: transparent;
}

.category-filter {
    display: flex;
    justify-content: center;
    gap: 0.8rem;
    margin: 1.5rem 0;
    flex-wrap: wrap;
}

.filter-btn {
    padding: 0.6rem 1.2rem;
    border: 1px solid #ddd;
    background: white;
    color: #666;
    border-radius: 8px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.3s ease;
}

.filter-btn:hover {
    border-color: #667eea;
    color: #667eea;
}

.filter-btn.active {
    background: #667eea;
    color: white;
    border-color: #667eea;
}

.projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 1.5rem;
    margin-top: 2rem;
}

.project-card {
    background: white;
    border-radius: 15px;
    padding: 1.5rem;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid #eee;
}

.project-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
}

.card-academic {
    border-left: 4px solid #667eea;
}

.card-tech {
    border-left: 4px solid #11998e;
    background: linear-gradient(135deg, #f8f9fa 0%, #fff 100%);
}

.card-header {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    margin-bottom: 1rem;
}

.card-icon {
    font-size: 1.5rem;
}

.card-title {
    font-size: 1.2rem;
    color: #2c3e50;
    margin: 0;
    flex: 1;
}

.card-description {
    color: #666;
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 1rem;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
}

.card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1rem;
}

.tag {
    padding: 0.3rem 0.8rem;
    background: rgba(102, 126, 234, 0.1);
    color: #667eea;
    border-radius: 15px;
    font-size: 0.8rem;
}

.card-links {
    display: flex;
    gap: 0.8rem;
}

.link-btn {
    padding: 0.5rem 1rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-size: 0.85rem;
    transition: all 0.3s ease;
}

.link-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
}

.projects-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 2rem;
    background: white;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.projects-table th {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 1rem;
    text-align: left;
    font-weight: 500;
}

.projects-table td {
    padding: 1rem;
    border-bottom: 1px solid #eee;
}

.projects-table tr {
    cursor: pointer;
    transition: background 0.3s ease;
}

.projects-table tr:hover {
    background: rgba(102, 126, 234, 0.05);
}

.project-name {
    font-weight: 600;
    color: #2c3e50;
}

.category-badge {
    padding: 0.3rem 0.8rem;
    background: rgba(102, 126, 234, 0.1);
    color: #667eea;
    border-radius: 15px;
    font-size: 0.85rem;
}

.project-desc {
    color: #666;
    max-width: 400px;
}

.project-links {
    display: flex;
    gap: 0.8rem;
}

.project-links a {
    color: #667eea;
    text-decoration: none;
    font-weight: 500;
}

.project-links a:hover {
    text-decoration: underline;
}

.loading-spinner {
    text-align: center;
    padding: 3rem;
}

.spinner {
    width: 50px;
    height: 50px;
    border: 4px solid #f3f3f3;
    border-top: 4px solid #667eea;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    margin: 0 auto 1rem;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

[data-theme="dark"] .projects-header h1 {
    color: #ecf0f1;
}

[data-theme="dark"] .projects-header p {
    color: #aaa;
}

[data-theme="dark"] .filter-btn {
    background: #2d2d2d;
    border-color: #444;
    color: #aaa;
}

[data-theme="dark"] .filter-btn.active {
    background: #667eea;
    color: white;
}

[data-theme="dark"] .project-card {
    background: #1e1e1e;
    border-color: #333;
}

[data-theme="dark"] .card-title {
    color: #ecf0f1;
}

[data-theme="dark"] .card-description {
    color: #aaa;
}

[data-theme="dark"] .projects-table {
    background: #1e1e1e;
}

[data-theme="dark"] .projects-table th {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

[data-theme="dark"] .projects-table td {
    border-color: #333;
    color: #ecf0f1;
}

[data-theme="dark"] .projects-table tr:hover {
    background: rgba(102, 126, 234, 0.1);
}

@media (max-width: 768px) {
    .projects-page {
        padding: 1rem;
    }
    
    .projects-header h1 {
        font-size: 1.8rem;
    }
    
    .projects-grid {
        grid-template-columns: 1fr;
    }
    
    .category-filter {
        gap: 0.5rem;
    }
    
    .filter-btn {
        padding: 0.5rem 0.8rem;
        font-size: 0.8rem;
    }
}
</style>
{{- end -}}
