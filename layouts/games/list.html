{{- define "title" }}{{ .Title }} - {{ .Site.Title }}{{- end -}}

{{- define "content" -}}
<div class="games-page">
    <h1 class="games-title">🎮 小游戏中心</h1>
    <p class="games-description">欢迎来到小游戏中心！选择一个游戏开始玩吧。</p>

    <div class="games-menu">
        <div class="game-card" onclick="showGame('guess-number')">
            <div class="game-icon">🎯</div>
            <h3>猜数字</h3>
            <p>猜一个1-100之间的数字</p>
        </div>
        <div class="game-card" onclick="showGame('tic-tac-toe')">
            <div class="game-icon">⭕</div>
            <h3>井字棋</h3>
            <p>经典井字棋游戏</p>
        </div>
        <div class="game-card" onclick="showGame('memory')">
            <div class="game-icon">🧠</div>
            <h3>记忆翻牌</h3>
            <p>翻转卡片找到配对</p>
        </div>
        <div class="game-card" onclick="showGame('snake')">
            <div class="game-icon">🐍</div>
            <h3>贪吃蛇</h3>
            <p>经典贪吃蛇游戏</p>
        </div>
    </div>

    <div id="game-container" class="game-container" style="display:none;">
        <button class="back-btn" onclick="hideGame()">← 返回游戏菜单</button>
        <div id="game-content"></div>
    </div>
</div>

<style>
.games-page {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
}

.games-title {
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 1rem;
    color: #2c3e50;
}

.games-description {
    text-align: center;
    color: #666;
    margin-bottom: 2rem;
}

.games-menu {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 1.5rem;
    margin-bottom: 2rem;
}

.game-card {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 15px;
    padding: 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    color: white;
}

.game-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
}

.game-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
}

.game-card h3 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
}

.game-card p {
    opacity: 0.9;
}

.game-container {
    background: white;
    border-radius: 15px;
    padding: 2rem;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.back-btn {
    background: #667eea;
    color: white;
    border: none;
    padding: 0.8rem 1.5rem;
    border-radius: 8px;
    cursor: pointer;
    font-size: 1rem;
    margin-bottom: 1.5rem;
}

.back-btn:hover {
    background: #5a6fd6;
}

/* Guess Number Game */
.guess-game {
    text-align: center;
}

.guess-game input {
    padding: 0.8rem 1.5rem;
    border: 2px solid #ddd;
    border-radius: 10px;
    font-size: 1.1rem;
    width: 200px;
    margin-right: 0.5rem;
}

.guess-game button {
    padding: 0.8rem 1.5rem;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    cursor: pointer;
}

.guess-game button:hover {
    background: #5a6fd6;
}

.game-result {
    margin: 1rem 0;
    font-size: 1.2rem;
}

.game-history {
    margin-top: 1rem;
    max-height: 200px;
    overflow-y: auto;
}

.history-item {
    padding: 0.5rem;
    margin: 0.3rem 0;
    background: #f5f5f5;
    border-radius: 5px;
}

/* Tic Tac Toe */
.tic-tac-toe {
    text-align: center;
}

.board {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 5px;
    margin: 1rem auto;
    width: fit-content;
}

.cell {
    width: 100px;
    height: 100px;
    background: #f0f0f0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2.5rem;
    cursor: pointer;
    border-radius: 10px;
    transition: background 0.2s;
}

.cell:hover {
    background: #e0e0e0;
}

/* Memory Game */
.memory-game {
    text-align: center;
}

.memory-board {
    display: grid;
    grid-template-columns: repeat(4, 80px);
    gap: 10px;
    margin: 1rem auto;
    width: fit-content;
}

.memory-card {
    width: 80px;
    height: 80px;
    background: #667eea;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    cursor: pointer;
    transition: transform 0.3s;
    color: white;
}

.memory-card.flipped {
    background: white;
    color: #333;
    border: 2px solid #667eea;
}

.memory-card.matched {
    background: #27ae60;
    color: white;
}

/* Snake Game */
.snake-game {
    text-align: center;
}

#snake-canvas {
    border: 2px solid #667eea;
    border-radius: 10px;
    margin: 1rem auto;
    display: block;
}
</style>

<script>
function showGame(game) {
    document.querySelector('.games-menu').style.display = 'none';
    document.getElementById('game-container').style.display = 'block';
    
    switch(game) {
        case 'guess-number':
            initGuessGame();
            break;
        case 'tic-tac-toe':
            initTicTacToe();
            break;
        case 'memory':
            initMemoryGame();
            break;
        case 'snake':
            initSnakeGame();
            break;
    }
}

function hideGame() {
    document.querySelector('.games-menu').style.display = 'grid';
    document.getElementById('game-container').style.display = 'none';
    document.getElementById('game-content').innerHTML = '';
}

// Guess Number Game
function initGuessGame() {
    let secret = Math.floor(Math.random() * 100) + 1;
    let attempts = 0;
    
    document.getElementById('game-content').innerHTML = `
        <div class="guess-game">
            <h2>🎯 猜数字游戏</h2>
            <p>猜一个1-100之间的数字，看看你能几次猜中！</p>
            <div style="margin: 1.5rem 0;">
                <input type="number" id="guess-input" min="1" max="100" placeholder="输入你的猜测">
                <button onclick="makeGuess()">猜测</button>
                <button onclick="initGuessGame()" style="background:#27ae60;">重新开始</button>
            </div>
            <div id="guess-result" class="game-result"></div>
            <div id="guess-history" class="game-history"></div>
        </div>
    `;
    
    window.makeGuess = function() {
        const input = document.getElementById('guess-input');
        const result = document.getElementById('guess-result');
        const history = document.getElementById('guess-history');
        const guess = parseInt(input.value);
        
        if (isNaN(guess) || guess < 1 || guess > 100) {
            result.innerHTML = '<p style="color:#e74c3c;">请输入1-100之间的数字！</p>';
            return;
        }
        
        attempts++;
        
        if (guess === secret) {
            result.innerHTML = `<p style="color:#27ae60;">🎉 恭喜你猜对了！答案就是 ${secret}！</p>
                               <p>你总共猜了 ${attempts} 次</p>`;
        } else if (guess < secret) {
            result.innerHTML = '<p style="color:#3498db;">📈 太小了，再大一点！</p>';
        } else {
            result.innerHTML = '<p style="color:#e67e22;">📉 太大了，再小一点！</p>';
        }
        
        const item = document.createElement('div');
        item.className = 'history-item';
        item.textContent = `第${attempts}次: ${guess} ${guess < secret ? '(小)' : guess > secret ? '(大)' : '(对)'}`;
        history.appendChild(item);
        
        input.value = '';
        input.focus();
    };
}

// Tic Tac Toe Game
function initTicTacToe() {
    let board = ['', '', '', '', '', '', '', '', ''];
    let currentPlayer = 'X';
    let gameActive = true;
    
    document.getElementById('game-content').innerHTML = `
        <div class="tic-tac-toe">
            <h2>⭕ 井字棋</h2>
            <p id="ttt-status">轮到 ${currentPlayer} 了</p>
            <div class="board" id="ttt-board"></div>
            <button onclick="initTicTacToe()" style="margin-top:1rem;padding:0.8rem 1.5rem;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;">重新开始</button>
        </div>
    `;
    
    const boardEl = document.getElementById('ttt-board');
    boardEl.innerHTML = '';
    
    for (let i = 0; i < 9; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.addEventListener('click', () => handleCellClick(i));
        boardEl.appendChild(cell);
    }
    
    function handleCellClick(index) {
        if (board[index] || !gameActive) return;
        
        board[index] = currentPlayer;
        renderBoard();
        
        if (checkWin()) {
            document.getElementById('ttt-status').textContent = `🎉 ${currentPlayer} 赢了！`;
            gameActive = false;
            return;
        }
        
        if (board.every(cell => cell)) {
            document.getElementById('ttt-status').textContent = '🤝 平局！';
            gameActive = false;
            return;
        }
        
        currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
        document.getElementById('ttt-status').textContent = `轮到 ${currentPlayer} 了`;
    }
    
    function renderBoard() {
        const cells = boardEl.querySelectorAll('.cell');
        cells.forEach((cell, i) => {
            cell.textContent = board[i];
            cell.style.color = board[i] === 'X' ? '#e74c3c' : '#3498db';
        });
    }
    
    function checkWin() {
        const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        return wins.some(([a,b,c]) => board[a] && board[a] === board[b] && board[a] === board[c]);
    }
}

// Memory Game
function initMemoryGame() {
    const emojis = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🥝', '🍑'];
    const cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);
    let flipped = [];
    let matched = [];
    let moves = 0;
    
    document.getElementById('game-content').innerHTML = `
        <div class="memory-game">
            <h2>🧠 记忆翻牌</h2>
            <p>翻转卡片找到配对！移动次数: <span id="memory-moves">0</span></p>
            <div class="memory-board" id="memory-board"></div>
            <button onclick="initMemoryGame()" style="margin-top:1rem;padding:0.8rem 1.5rem;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;">重新开始</button>
        </div>
    `;
    
    const boardEl = document.getElementById('memory-board');
    boardEl.innerHTML = '';
    
    cards.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'memory-card';
        card.textContent = '?';
        card.addEventListener('click', () => flipCard(i));
        boardEl.appendChild(card);
    });
    
    function flipCard(index) {
        if (flipped.length === 2 || flipped.includes(index) || matched.includes(index)) return;
        
        flipped.push(index);
        renderBoard();
        
        if (flipped.length === 2) {
            moves++;
            document.getElementById('memory-moves').textContent = moves;
            
            if (cards[flipped[0]] === cards[flipped[1]]) {
                matched.push(...flipped);
                flipped = [];
                renderBoard();
                
                if (matched.length === cards.length) {
                    setTimeout(() => alert(`🎉 恭喜！你用了 ${moves} 步完成了游戏！`), 300);
                }
            } else {
                setTimeout(() => {
                    flipped = [];
                    renderBoard();
                }, 1000);
            }
        }
    }
    
    function renderBoard() {
        const cardEls = boardEl.querySelectorAll('.memory-card');
        cardEls.forEach((card, i) => {
            if (flipped.includes(i) || matched.includes(i)) {
                card.textContent = cards[i];
                card.classList.add('flipped');
                if (matched.includes(i)) card.classList.add('matched');
            } else {
                card.textContent = '?';
                card.classList.remove('flipped', 'matched');
            }
        });
    }
}

// Snake Game
function initSnakeGame() {
    document.getElementById('game-content').innerHTML = `
        <div class="snake-game">
            <h2>🐍 贪吃蛇</h2>
            <p>使用方向键或WASD控制蛇的方向 | 得分: <span id="snake-score">0</span></p>
            <canvas id="snake-canvas" width="400" height="400"></canvas>
            <div>
                <button onclick="startSnake()" style="padding:0.8rem 1.5rem;background:#27ae60;color:white;border:none;border-radius:8px;cursor:pointer;margin:0.5rem;">开始游戏</button>
                <button onclick="initSnakeGame()" style="padding:0.8rem 1.5rem;background:#667eea;color:white;border:none;border-radius:8px;cursor:pointer;margin:0.5rem;">重新开始</button>
            </div>
        </div>
    `;
    
    const canvas = document.getElementById('snake-canvas');
    const ctx = canvas.getContext('2d');
    
    window.startSnake = function() {
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;
        
        let snake = [{x: 10, y: 10}];
        let food = {x: 15, y: 15};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let gameLoop;
        
        document.addEventListener('keydown', (e) => {
            switch(e.key) {
                case 'ArrowUp': case 'w': case 'W': if (dy === 0) { dx = 0; dy = -1; } break;
                case 'ArrowDown': case 's': case 'S': if (dy === 0) { dx = 0; dy = 1; } break;
                case 'ArrowLeft': case 'a': case 'A': if (dx === 0) { dx = -1; dy = 0; } break;
                case 'ArrowRight': case 'd': case 'D': if (dx === 0) { dx = 1; dy = 0; } break;
            }
        });
        
        function gameStep() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                clearInterval(gameLoop);
                alert(`游戏结束！得分: ${score}`);
                return;
            }
            
            if (snake.some(seg => seg.x === head.x && seg.y === head.y)) {
                clearInterval(gameLoop);
                alert(`游戏结束！得分: ${score}`);
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('snake-score').textContent = score;
                food = {x: Math.floor(Math.random() * tileCount), y: Math.floor(Math.random() * tileCount)};
            } else {
                snake.pop();
            }
            
            drawGame();
        }
        
        function drawGame() {
            ctx.fillStyle = '#f0f0f0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = '#e74c3c';
            ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
            
            snake.forEach((seg, i) => {
                ctx.fillStyle = i === 0 ? '#27ae60' : '#2ecc71';
                ctx.fillRect(seg.x * gridSize, seg.y * gridSize, gridSize - 2, gridSize - 2);
            });
        }
        
        drawGame();
        gameLoop = setInterval(gameStep, 150);
    };
}
</script>
{{- end -}}
