{{- define "title" }}{{ .Title }} - {{ .Site.Title }}{{- end -}}

{{- define "content" -}}
<div class="resume-page">
    <div class="resume-content">
        {{- dict "Content" .Content "Ruby" true "Fraction" true | partial "function/content.html" | safeHTML -}}
    </div>
</div>

<style>
.resume-page {
    max-width: 900px;
    margin: 0 auto;
    padding: 2rem;
}

.resume-content {
    background: white;
    border-radius: 15px;
    padding: 3rem;
    box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}

.resume-content h1 {
    text-align: center;
    color: #2c3e50;
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
}

.resume-content h2 {
    color: #667eea;
    border-bottom: 2px solid #667eea;
    padding-bottom: 0.5rem;
    margin-top: 2rem;
}

.resume-content h3 {
    color: #34495e;
    margin-top: 1.5rem;
}

.resume-content ul {
    list-style-type: none;
    padding-left: 0;
}

.resume-content ul li {
    padding: 0.5rem 0;
    padding-left: 1.5rem;
    position: relative;
}

.resume-content ul li::before {
    content: "•";
    color: #667eea;
    position: absolute;
    left: 0;
}

.resume-content strong {
    color: #2c3e50;
}

.resume-content a {
    color: #667eea;
    text-decoration: none;
}

.resume-content a:hover {
    text-decoration: underline;
}

.resume-content hr {
    border: none;
    border-top: 1px solid #eee;
    margin: 2rem 0;
}

.resume-content p {
    line-height: 1.8;
    color: #555;
}

.resume-content blockquote {
    border-left: 4px solid #667eea;
    padding-left: 1rem;
    margin-left: 0;
    color: #666;
    font-style: italic;
}
</style>
{{- end -}}
