<div class="music-page">
    <h1 class="music-title">🎵 音乐播放器</h1>
    <p class="music-description">在线音乐播放器，支持歌单管理、歌词显示</p>

    <div class="music-player-wrapper">
        <div class="playlist-panel">
            <div class="playlist-header">
                <h2>🎶 歌单</h2>
                <span class="playlist-count" id="playlist-count">0 首歌曲</span>
            </div>
            <div class="playlist-search">
                <input type="text" id="search-input" placeholder="搜索歌曲..." oninput="searchSongs()">
            </div>
            <div class="playlist-list" id="playlist-list">
            </div>
        </div>

        <div class="player-panel">
            <div class="player-cover">
                <div class="cover-disc" id="cover-disc">
                    <div class="cover-inner">
                        <span class="cover-emoji" id="cover-emoji">🎵</span>
                    </div>
                </div>
                <div class="now-playing-info">
                    <h3 class="song-title" id="song-title">未选择歌曲</h3>
                    <p class="song-artist" id="song-artist">--</p>
                </div>
            </div>

            <div class="player-progress">
                <span class="time-current" id="time-current">0:00</span>
                <div class="progress-bar" id="progress-bar" onclick="seekTo(event)">
                    <div class="progress-fill" id="progress-fill"></div>
                    <div class="progress-handle" id="progress-handle"></div>
                </div>
                <span class="time-total" id="time-total">0:00</span>
            </div>

            <div class="player-controls">
                <button class="control-btn" onclick="toggleShuffle()" id="shuffle-btn" title="随机播放">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
                    </svg>
                </button>
                <button class="control-btn" onclick="prevSong()" title="上一首">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>
                <button class="control-btn play-btn" onclick="togglePlay()" id="play-btn" title="播放/暂停">
                    <svg viewBox="0 0 24 24" width="32" height="32" fill="currentColor" id="play-icon">
                        <path d="M8 5v14l11-7z"/>
                    </svg>
                </button>
                <button class="control-btn" onclick="nextSong()" title="下一首">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>
                <button class="control-btn" onclick="toggleRepeat()" id="repeat-btn" title="循环模式">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
                        <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                    </svg>
                </button>
            </div>

            <div class="player-volume">
                <button class="volume-btn" onclick="toggleMute()" id="volume-icon-btn" title="静音">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor" id="volume-icon">
                        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
                    </svg>
                </button>
                <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="80" oninput="setVolume(this.value)">
            </div>
        </div>

        <div class="lyrics-panel">
            <div class="lyrics-header">
                <h2>📝 歌词</h2>
            </div>
            <div class="lyrics-content" id="lyrics-content">
                <p class="lyrics-placeholder">选择一首歌曲开始播放</p>
            </div>
        </div>
    </div>
</div>

<audio id="audio-player" preload="auto"></audio>

/* ========== 音乐播放器页面基础 ========== */
.music-page {
    max-width: 1400px;
    margin: 0 auto;
    padding: 2rem;
}

.music-title {
    text-align: center;
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
    color: #2c3e50;
}

.music-description {
    text-align: center;
    color: #666;
    margin-bottom: 2rem;
    font-size: 1.1rem;
}

/* ========== 主布局：三栏 ========== */
.music-player-wrapper {
    display: grid;
    grid-template-columns: 280px 1fr 280px;
    gap: 1.5rem;
    min-height: 600px;
}

/* ========== 左侧歌单面板 ========== */
.playlist-panel {
    background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);

    padding: 1.5rem;
    color: white;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 40px rgba(102, 126, 234, 0.3);
}

.playlist-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
}

.playlist-header h2 {
    font-size: 1.3rem;
    margin: 0;
}

.playlist-count {
    font-size: 0.85rem;
    opacity: 0.8;
}

.playlist-search input {
    width: 100%;
    padding: 0.7rem 1rem;
    border: none;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    font-size: 0.9rem;
    margin-bottom: 1rem;
    box-sizing: border-box;
}

.playlist-search input::placeholder {
    color: rgba(255, 255, 255, 0.6);
}

.playlist-search input:focus {
    outline: none;
    background: rgba(255, 255, 255, 0.3);
}

.playlist-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.3) transparent;
}

.playlist-list::-webkit-scrollbar {
    width: 6px;
}

.playlist-list::-webkit-scrollbar-track {
    background: transparent;
}

.playlist-list::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.3);
    border-radius: 3px;
}

.playlist-item {
    display: flex;
    align-items: center;
    padding: 0.8rem;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    margin-bottom: 0.3rem;
}

.playlist-item:hover {
    background: rgba(255, 255, 255, 0.15);
}

.playlist-item.active {
    background: rgba(255, 255, 255, 0.25);
}

.playlist-item-cover {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    margin-right: 0.8rem;
    flex-shrink: 0;
}

.playlist-item-info {
    flex: 1;
    min-width: 0;
}

.playlist-item-title {
    font-size: 0.9rem;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.playlist-item-artist {
    font-size: 0.75rem;
    opacity: 0.7;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}

.playlist-item-duration {
    font-size: 0.75rem;
    opacity: 0.6;
    margin-left: 0.5rem;
}

/* ========== 中间播放器面板 ========== */
.player-panel {
    background: white;
    border-radius: 20px;
    padding: 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    box-shadow: 0 5px 20px rgba(0,0,0,0.08);
}

.player-cover {
    text-align: center;
    margin-bottom: 2rem;
}

.cover-disc {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    margin: 0 auto 1.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
    transition: transform 0.3s ease;
}

.cover-disc.spinning {
    animation: spin 8s linear infinite;
}

@keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
}

.cover-inner {
    width: 80px;
    height: 80px;
    border-radius: 50%;
    background: white;
    display: flex;
    align-items: center;
    justify-content: center;
}

.cover-emoji {
    font-size: 2.5rem;
}

.now-playing-info {
    text-align: center;
}

.song-title {
    font-size: 1.4rem;
    color: #2c3e50;
    margin: 0 0 0.3rem;
    font-weight: 600;
}

.song-artist {
    font-size: 1rem;
    color: #666;
    margin: 0;
}

/* ========== 进度条 ========== */
.player-progress {
    display: flex;
    align-items: center;
    width: 100%;
    max-width: 500px;
    margin: 1.5rem 0;
    gap: 0.8rem;
}

.time-current, .time-total {
    font-size: 0.8rem;
    color: #999;
    min-width: 35px;
    text-align: center;
}

.progress-bar {
    flex: 1;
    height: 6px;
    background: #e0e0e0;
    border-radius: 3px;
    cursor: pointer;
    position: relative;
}

.progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #667eea, #764ba2);
    border-radius: 3px;
    width: 0%;
    transition: width 0.1s linear;
}

.progress-handle {
    width: 14px;
    height: 14px;
    background: #667eea;
    border-radius: 50%;
    position: absolute;
    top: 50%;
    left: 0%;
    transform: translate(-50%, -50%);
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 2px 6px rgba(102, 126, 234, 0.5);
}

.progress-bar:hover .progress-handle {
    opacity: 1;
}

/* ========== 播放控制按钮 ========== */
.player-controls {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
}

.control-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    padding: 0.5rem;
    border-radius: 50%;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

.control-btn:hover {
    color: #667eea;
    background: rgba(102, 126, 234, 0.1);
}

.control-btn.active {
    color: #667eea;
}

.play-btn {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
}

.play-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
    color: white;
    background: linear-gradient(135deg, #5a6fd6 0%, #6a3f96 100%);
}

/* ========== 音量控制 ========== */
.player-volume {
    display: flex;
    align-items: center;
    gap: 0.5rem;
}

.volume-btn {
    background: none;
    border: none;
    color: #555;
    cursor: pointer;
    padding: 0.3rem;
    display: flex;
    align-items: center;
}

.volume-btn:hover {
    color: #667eea;
}

.volume-slider {
    width: 100px;
    height: 4px;
    -webkit-appearance: none;
    appearance: none;
    background: #e0e0e0;
    border-radius: 2px;
    outline: none;
}

.volume-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 14px;
    height: 14px;
    background: #667eea;
    border-radius: 50%;
    cursor: pointer;
}

.volume-slider::-moz-range-thumb {
    width: 14px;
    height: 14px;
    background: #667eea;
    border-radius: 50%;
    cursor: pointer;
    border: none;
}

/* ========== 右侧歌词面板 ========== */
.lyrics-panel {
    background: linear-gradient(180deg, #11998e 0%, #38ef7d 100%);

    padding: 1.5rem;

.lyrics-header h2 {

.lyrics-content {

    padding-right: 0.5rem;
}

.lyrics-content::-webkit-scrollbar {

}

.lyrics-content::-webkit-scrollbar-track {
    background: transparent;
}

.lyrics-content::-webkit-scrollbar-thumb {

    border-radius: 3px;
}

.lyrics-line {
    padding: 0.5rem 0.8rem;
    border-radius: 8px;
    transition: all 0.3s ease;
    cursor: pointer;
    font-size: 0.95rem;
    line-height: 1.6;
}

.lyrics-line:hover {

}

.lyrics-line.active {
    background: rgba(255, 255, 255, 0.2);
    font-weight: 600;
    font-size: 1.05rem;
}

.lyrics-placeholder {
    text-align: center;
    opacity: 0.6;
    margin-top: 3rem;
}

/* ========== 响应式设计 ========== */
@media (max-width: 1024px) {
    .music-player-wrapper {
        grid-template-columns: 1fr;
        gap: 1rem;
    }

    .playlist-panel, .lyrics-panel {
        max-height: 300px;
    }

    .cover-disc {
        width: 150px;
        height: 150px;
    }

    .cover-inner {
        width: 60px;
        height: 60px;
    }

    .cover-emoji {
        font-size: 1.8rem;
    }
}

@media (max-width: 768px) {
    .music-page {
        padding: 1rem;
    }

    .music-title {
        font-size: 1.8rem;
    }

    .music-player-wrapper {
        grid-template-columns: 1fr;
    }

    .playlist-panel, .lyrics-panel {
        max-height: 250px;
    }

    .player-panel {
        padding: 1.5rem;
    }

    .cover-disc {
        width: 120px;
        height: 120px;
    }

    .cover-inner {
        width: 50px;
        height: 50px;
    }

    .cover-emoji {
        font-size: 1.5rem;
    }

    .song-title {
        font-size: 1.2rem;
    }

    .player-controls {
        gap: 0.5rem;
    }

    .play-btn {
        width: 50px;
        height: 50px;
    }
}

/* ========== 暗色模式 ========== */
[data-theme="dark"] .music-title {
    color: #ecf0f1;
}

[data-theme="dark"] .music-description {
    color: #aaa;

[data-theme="dark"] .player-panel {

[data-theme="dark"] .song-artist {

[data-theme="dark"] .control-btn {

}

[data-theme="dark"] .control-btn:hover {

}

[data-theme="dark"] .progress-bar {
    background: #333;
}

[data-theme="dark"] .time-current,
[data-theme="dark"] .time-total {
    color: #777;
}

[data-theme="dark"] .volume-btn {
    color: #aaa;
}

[data-theme="dark"] .volume-slider {
    background: #333;
}
</style>

// ========== 播放器状态 ==========
let currentSongIndex = -1;
let isPlaying = false;
let isShuffle = false;
let repeatMode = 0; // 0: 不循环, 1: 单曲循环, 2: 列表循环
let audioPlayer = null;

// ========== 初始化 ==========
document.addEventListener('DOMContentLoaded', function() {
    audioPlayer = document.getElementById('audio-player');
    renderPlaylist();
    updatePlaylistCount();

    // 音频事件监听
    audioPlayer.addEventListener('timeupdate', updateProgress);
    audioPlayer.addEventListener('ended', handleSongEnd);
    audioPlayer.addEventListener('loadedmetadata', function() {
        document.getElementById('time-total').textContent = formatTime(audioPlayer.duration);
    });
});

// ========== 渲染歌单 ==========
function renderPlaylist(filter = '') {
    const listEl = document.getElementById('playlist-list');
    const filtered = filter
        ? playlist.filter(s => s.title.toLowerCase().includes(filter.toLowerCase()) || s.artist.toLowerCase().includes(filter.toLowerCase()))
        : playlist;

    listEl.innerHTML = filtered.map((song, index) => `
        <div class="playlist-item ${currentSongIndex === playlist.indexOf(song) ? 'active' : ''}"
             onclick="playSong(${playlist.indexOf(song)})">
            <div class="playlist-item-cover">${song.emoji}</div>
            <div class="playlist-item-info">
                <div class="playlist-item-title">${song.title}</div>
                <div class="playlist-item-artist">${song.artist}</div>
            </div>
            <div class="playlist-item-duration">${song.duration}</div>
        </div>
    `).join('');
}

function updatePlaylistCount() {
    document.getElementById('playlist-count').textContent = `${playlist.length} 首歌曲`;
}

function searchSongs() {
    const query = document.getElementById('search-input').value;
    renderPlaylist(query);
}

// ========== 播放控制 ==========
function playSong(index) {
    if (index < 0 || index >= playlist.length) return;

    currentSongIndex = index;
    const song = playlist[index];

    audioPlayer.src = song.url;
    audioPlayer.play().then(() => {
        isPlaying = true;
        updatePlayButton();
        updateNowPlaying(song);
        renderLyrics(song);
        renderPlaylist(document.getElementById('search-input').value);
        document.getElementById('cover-disc').classList.add('spinning');
    }).catch(err => {
        console.log('播放失败:', err);
    });
}

function togglePlay() {
    if (currentSongIndex === -1) {
        if (playlist.length > 0) playSong(0);
        return;
    }

    if (isPlaying) {
        audioPlayer.pause();
        isPlaying = false;
        document.getElementById('cover-disc').classList.remove('spinning');
    } else {
        audioPlayer.play();
        isPlaying = true;
        document.getElementById('cover-disc').classList.add('spinning');
    }
    updatePlayButton();
}

function prevSong() {
    if (playlist.length === 0) return;

    let newIndex;
    if (isShuffle) {
        newIndex = Math.floor(Math.random() * playlist.length);
    } else {
        newIndex = currentSongIndex <= 0 ? playlist.length - 1 : currentSongIndex - 1;
    }
    playSong(newIndex);
}

function nextSong() {
    if (playlist.length === 0) return;

    let newIndex;
    if (isShuffle) {
        newIndex = Math.floor(Math.random() * playlist.length);
    } else {
        newIndex = currentSongIndex >= playlist.length - 1 ? 0 : currentSongIndex + 1;
    }
    playSong(newIndex);
}

function handleSongEnd() {
    if (repeatMode === 1) {
        // 单曲循环
        audioPlayer.currentTime = 0;
        audioPlayer.play();
    } else if (repeatMode === 2 || currentSongIndex < playlist.length - 1) {
        // 列表循环或还有下一首
        nextSong();
    } else {
        // 播放结束
        isPlaying = false;
        updatePlayButton();
        document.getElementById('cover-disc').classList.remove('spinning');
    }
}

function toggleShuffle() {
    isShuffle = !isShuffle;
    document.getElementById('shuffle-btn').classList.toggle('active', isShuffle);
}

function toggleRepeat() {
    repeatMode = (repeatMode + 1) % 3;
    const btn = document.getElementById('repeat-btn');
    btn.classList.toggle('active', repeatMode > 0);
    btn.title = ['不循环', '单曲循环', '列表循环'][repeatMode];
}

// ========== 进度条 ==========
function updateProgress() {
    if (!audioPlayer.duration) return;

    const percent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
    document.getElementById('progress-fill').style.width = percent + '%';
    document.getElementById('progress-handle').style.left = percent + '%';
    document.getElementById('time-current').textContent = formatTime(audioPlayer.currentTime);

    // 更新歌词高亮
    updateLyricsHighlight();
}

function seekTo(event) {
    if (!audioPlayer.duration) return;

    const bar = document.getElementById('progress-bar');
    const rect = bar.getBoundingClientRect();
    const percent = (event.clientX - rect.left) / rect.width;
    audioPlayer.currentTime = percent * audioPlayer.duration;
}

// ========== 音量控制 ==========
function setVolume(value) {
    audioPlayer.volume = value / 100;
    updateVolumeIcon();
}

function toggleMute() {
    audioPlayer.muted = !audioPlayer.muted;
    updateVolumeIcon();
}

function updateVolumeIcon() {
    const icon = document.getElementById('volume-icon');
    if (audioPlayer.muted || audioPlayer.volume === 0) {
        icon.innerHTML = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>';
    } else if (audioPlayer.volume < 0.5) {
        icon.innerHTML = '<path d="M18.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM5 9v6h4l5 5V4L9 9H5z"/>';
    } else {
        icon.innerHTML = '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>';
    }
}

// ========== UI 更新 ==========
function updatePlayButton() {
    const icon = document.getElementById('play-icon');
    if (isPlaying) {
        icon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    } else {
        icon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    }
}

function updateNowPlaying(song) {
    document.getElementById('song-title').textContent = song.title;
    document.getElementById('song-artist').textContent = song.artist;
    document.getElementById('cover-emoji').textContent = song.emoji;
}

// ========== 歌词 ==========
function renderLyrics(song) {
    const container = document.getElementById('lyrics-content');
    if (!song.lyrics || song.lyrics.length === 0) {
        container.innerHTML = '<p class="lyrics-placeholder">暂无歌词</p>';
        return;
    }

    container.innerHTML = song.lyrics.map((line, index) => `
        <div class="lyrics-line" data-time="${line.time}" onclick="seekToLyric(${line.time})">
            ${line.text}
        </div>
    `).join('');
}

function updateLyricsHighlight() {
    if (currentSongIndex === -1) return;

    const song = playlist[currentSongIndex];
    if (!song.lyrics) return;

    const currentTime = audioPlayer.currentTime;
    const lines = document.querySelectorAll('.lyrics-line');

    let activeIndex = 0;
    for (let i = song.lyrics.length - 1; i >= 0; i--) {
        if (currentTime >= song.lyrics[i].time) {
            activeIndex = i;
            break;
        }
    }

    lines.forEach((line, index) => {
        line.classList.toggle('active', index === activeIndex);
    });

    // 自动滚动到当前歌词
    const activeLine = lines[activeIndex];
    if (activeLine) {
        activeLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
}

function seekToLyric(time) {
    audioPlayer.currentTime = time;
    if (!isPlaying) {
        togglePlay();
    }
}

// ========== 工具函数 ==========
function formatTime(seconds) {
    if (isNaN(seconds)) return '0:00';
    const mins = Math.floor(seconds / 60);
    const secs = Math.floor(seconds % 60);
    return `${mins}:${secs.toString().padStart(2, '0')}`;
}
</script>
